// ── 日付ヘルパー ──────────────────────────────────────
function toKey(d) { return d.toISOString().slice(0, 10); }
function todayKey() { return toKey(new Date()); }
function prevDay(k) { const d = new Date(k + "T00:00:00"); d.setDate(d.getDate() - 1); return toKey(d); }
function nextDay(k) { const d = new Date(k + "T00:00:00"); d.setDate(d.getDate() + 1); return toKey(d); }
function dispDate(k) {
  return new Date(k + "T00:00:00").toLocaleDateString("ja-JP", { month: "short", day: "numeric", weekday: "short" });
}

// ── 全角→半角数字変換 ────────────────────────────────
function toHalf(s) { return s.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)); }

// ── 音声テキストのパース ──────────────────────────────
// 「睡眠7 ストレス2 天気晴 最高25 最低15 花粉多い メモ腕がかゆい」
function parseVoiceText(text) {
  const result = {};
  const num = (re) => { const m = text.match(re); return m ? parseFloat(toHalf(m[1])) : null; };
  const int = (re) => { const m = text.match(re); return m ? parseInt(toHalf(m[1])) : null; };

  const sleep = num(/睡眠\s*([0-9０-９.．]+)/);  if (sleep != null) result.sleep = sleep;
  const stress = int(/ストレス\s*([0-4０-４])/);  if (stress != null) result.stress = stress;
  const tHigh = int(/最高\s*([0-9０-９-－]+)/);   if (tHigh != null) result.tempHigh = tHigh;
  const tLow  = int(/最低\s*([0-9０-９-－]+)/);   if (tLow  != null) result.tempLow  = tLow;

  if (text.includes("晴"))                          result.weather = "☀️ 晴";
  else if (text.includes("雨"))                     result.weather = "🌧 雨";
  else if (text.includes("曇") || text.includes("くもり")) result.weather = "⛅ 曇";
  else if (text.includes("雪"))                     result.weather = "❄️ 雪";

  if (text.includes("非常に多い") || text.includes("めちゃ多")) result.pollen = "🔴 非常に多い";
  else if (text.includes("花粉多い") || text.includes("花粉多め")) result.pollen = "🟠 多い";
  else if (text.includes("花粉やや") || text.includes("花粉少し")) result.pollen = "🟡 やや多い";
  else if (text.includes("花粉少ない") || text.includes("花粉なし")) result.pollen = "🟢 少ない";

  if (text.includes("掃除した") || text.includes("掃除あり")) result.cleaning = true;
  if (text.includes("外干し")) result.laundry = "外干し";
  else if (text.includes("室内干し") || text.includes("部屋干し")) result.laundry = "室内干し";
  if (text.includes("換気した") || text.includes("換気あり")) result.ventilation = true;

  const memo = text.match(/メモ\s*(.+)/);
  if (memo) result.memo = memo[1].trim();

  return result;
}

  try { localStorage.setItem("atopy-logs", JSON.stringify(logs)); } catch {}

// ── 分析計算 ──────────────────────────────────────────
function calcFoodRanking(logs) {
  const stats = {};
  Object.values(logs).forEach(day => {
    if (day.score == null) return;
    const foods = [...(day["朝"] || []), ...(day["昼"] || []), ...(day["夜"] || [])];
    foods.forEach(f => {
      if (!stats[f]) stats[f] = { total: 0, count: 0 };
      stats[f].total += day.score;
      stats[f].count += 1;
    });
  });
  return Object.entries(stats)
    .filter(([, s]) => s.count >= 2)
    .map(([food, s]) => ({ food, avg: s.total / s.count, count: s.count }))
    .sort((a, b) => b.avg - a.avg);
}

function calcLifeRanking(logs) {
  // 睡眠・ストレス・天気・気温と症状スコアの相関をシンプルに集計
  const scored = Object.values(logs).filter(d => d.score != null);
  if (scored.length < 3) return null;

  // 睡眠: 7時間以上 vs 未満
  const sleepData = scored.filter(d => d.sleep != null);
  const sleepShort = sleepData.filter(d => d.sleep < 7);
  const sleepLong  = sleepData.filter(d => d.sleep >= 7);
  const sleepAvgShort = sleepShort.length ? sleepShort.reduce((s, d) => s + d.score, 0) / sleepShort.length : null;
  const sleepAvgLong  = sleepLong.length  ? sleepLong.reduce((s, d) => s + d.score, 0) / sleepLong.length  : null;

  // ストレス: 高(3-4) vs 低(0-1)
  const stressData = scored.filter(d => d.stress != null);
  const stressHigh = stressData.filter(d => d.stress >= 3);
  const stressLow  = stressData.filter(d => d.stress <= 1);
  const stressAvgHigh = stressHigh.length ? stressHigh.reduce((s, d) => s + d.score, 0) / stressHigh.length : null;
  const stressAvgLow  = stressLow.length  ? stressLow.reduce((s, d) => s + d.score, 0) / stressLow.length  : null;

  // 天気別平均
  const weatherMap = {};
  scored.filter(d => d.weather).forEach(d => {
    if (!weatherMap[d.weather]) weatherMap[d.weather] = { total: 0, count: 0 };
    weatherMap[d.weather].total += d.score;
    weatherMap[d.weather].count += 1;
  });
  const weatherAvg = Object.entries(weatherMap)
    .filter(([, v]) => v.count >= 2)
    .map(([w, v]) => ({ label: w, avg: v.total / v.count, count: v.count }))
    .sort((a, b) => b.avg - a.avg);

  return { sleepAvgShort, sleepAvgLong, stressAvgHigh, stressAvgLow, weatherAvg };
}

// ── 複合分析・アドバイス生成 ──────────────────────────
function generateAdvice(logs) {
  const scored = Object.values(logs).filter(d => d.score != null);
  if (scored.length < 3) return [];

  const advice = [];
  const bad = scored.filter(d => d.score >= 3);   // 悪化日
  const good = scored.filter(d => d.score <= 1);  // 良好日
  const badRate = bad.length / scored.length;

  // ── 睡眠 ────────────────────────────────────────────
  const sleepScored = scored.filter(d => d.sleep != null);
  if (sleepScored.length >= 3) {
    const short = sleepScored.filter(d => d.sleep < 6);
    const mid   = sleepScored.filter(d => d.sleep >= 6 && d.sleep < 7);
    const long  = sleepScored.filter(d => d.sleep >= 7);
    const avg = arr => arr.length ? arr.reduce((s, d) => s + d.score, 0) / arr.length : null;
    const aShort = avg(short), aMid = avg(mid), aLong = avg(long);

    if (aShort != null && aLong != null && aShort - aLong >= 0.8) {
      advice.push({
        level: "warning",
        icon: "💤",
        title: "睡眠不足が症状を悪化させています",
        body: `6時間未満の日の症状スコアは平均 ${aShort.toFixed(1)}、7時間以上では ${aLong.toFixed(1)} です。${(aShort - aLong).toFixed(1)}ポイントの差があります。`,
        action: "まず7時間の睡眠を目標にしてみましょう。"
      });
    } else if (aLong != null && aLong <= 1.0) {
      advice.push({
        level: "good",
        icon: "💤",
        title: "十分な睡眠が効果的です",
        body: `7時間以上寝た日の症状スコアは平均 ${aLong.toFixed(1)} と低めです。`,
        action: "この睡眠習慣を続けましょう。"
      });
    }

    // 睡眠不足の悪化日での割合
    if (bad.length >= 2) {
      const badWithSleep = bad.filter(d => d.sleep != null);
      const badSleepShort = badWithSleep.filter(d => d.sleep < 7);
      if (badWithSleep.length > 0 && badSleepShort.length / badWithSleep.length >= 0.6) {
        advice.push({
          level: "warning",
          icon: "⚠️",
          title: `悪化した日の ${Math.round(badSleepShort.length / badWithSleep.length * 100)}% が睡眠7時間未満でした`,
          body: "症状が悪化しやすい日には睡眠不足が関係していることが多いようです。",
          action: "睡眠を優先することが症状改善への近道かもしれません。"
        });
      }
    }
  }

  // ── ストレス ──────────────────────────────────────────
  const stressScored = scored.filter(d => d.stress != null);
  if (stressScored.length >= 3) {
    const high = stressScored.filter(d => d.stress >= 3);
    const low  = stressScored.filter(d => d.stress <= 1);
    const avg = arr => arr.length ? arr.reduce((s, d) => s + d.score, 0) / arr.length : null;
    const aHigh = avg(high), aLow = avg(low);

    if (aHigh != null && aLow != null && aHigh - aLow >= 0.8) {
      advice.push({
        level: "warning",
        icon: "😤",
        title: "ストレスが高い日は症状が悪化しやすいです",
        body: `ストレス高(3〜4)の日は平均 ${aHigh.toFixed(1)}、低(0〜1)の日は平均 ${aLow.toFixed(1)} です。`,
        action: "ストレス管理がアトピーケアに直結しています。入浴やストレッチなど自分なりのリセット習慣を作りましょう。"
      });
    }
  }

  // ── 天気 ──────────────────────────────────────────────
  const weatherScored = scored.filter(d => d.weather);
  if (weatherScored.length >= 3) {
    const byWeather = {};
    weatherScored.forEach(d => {
      if (!byWeather[d.weather]) byWeather[d.weather] = [];
      byWeather[d.weather].push(d.score);
    });
    const weatherAvgs = Object.entries(byWeather)
      .filter(([, arr]) => arr.length >= 2)
      .map(([w, arr]) => ({ w, avg: arr.reduce((s, v) => s + v, 0) / arr.length }))
      .sort((a, b) => b.avg - a.avg);

    if (weatherAvgs.length >= 2) {
      const worst = weatherAvgs[0], best = weatherAvgs[weatherAvgs.length - 1];
      if (worst.avg - best.avg >= 0.8) {
        advice.push({
          level: "info",
          icon: "🌤",
          title: `${worst.w} の日は症状が出やすい傾向があります`,
          body: `${worst.w} の日の平均スコアは ${worst.avg.toFixed(1)} で、${best.w} の日(${best.avg.toFixed(1)})より高めです。`,
          action: `${worst.w} の日は食事や睡眠を特に意識してみましょう。`
        });
      }
    }
  }

  // ── 複合要因：睡眠不足 × ストレス高 ────────────────────
  const combo1 = scored.filter(d => d.sleep != null && d.stress != null && d.sleep < 7 && d.stress >= 3);
  const comboGood = scored.filter(d => d.sleep != null && d.stress != null && d.sleep >= 7 && d.stress <= 1);
  if (combo1.length >= 2 && comboGood.length >= 2) {
    const avgBad  = combo1.reduce((s, d) => s + d.score, 0) / combo1.length;
    const avgGood = comboGood.reduce((s, d) => s + d.score, 0) / comboGood.length;
    if (avgBad - avgGood >= 1.0) {
      advice.push({
        level: "warning",
        icon: "🔥",
        title: "睡眠不足＋高ストレスが重なると特に悪化しています",
        body: `「睡眠7h未満かつストレス高」の日は平均スコア ${avgBad.toFixed(1)}、「睡眠7h以上かつストレス低」の日は ${avgGood.toFixed(1)} です。`,
        action: "この2つが重なる日は食事も慎重に。トリガー食材（卵・乳製品など）を避けるだけで変わるかもしれません。"
      });
    }
  }

  // ── 食材 × 生活習慣の複合 ────────────────────────────
  // 悪化日に最も多く登場する食材を特定
  if (bad.length >= 2) {
    const foodCount = {};
    bad.forEach(d => {
      const foods = [...(d["朝"] || []), ...(d["昼"] || []), ...(d["夜"] || [])];
      foods.forEach(f => { foodCount[f] = (foodCount[f] || 0) + 1; });
    });
    const topBadFoods = Object.entries(foodCount)
      .filter(([, c]) => c >= 2 && c / bad.length >= 0.5)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 3)
      .map(([f]) => f);

    if (topBadFoods.length > 0) {
      // 良好日での登場率と比較
      const goodFoodRate = {};
      if (good.length > 0) {
        good.forEach(d => {
          const foods = [...(d["朝"] || []), ...(d["昼"] || []), ...(d["夜"] || [])];
          foods.forEach(f => { goodFoodRate[f] = (goodFoodRate[f] || 0) + 1; });
        });
      }
      const suspectFoods = topBadFoods.filter(f => {
        const badR = (foodCount[f] || 0) / bad.length;
        const goodR = good.length > 0 ? ((goodFoodRate[f] || 0) / good.length) : 0;
        return badR - goodR >= 0.3;
      });

      if (suspectFoods.length > 0) {
        advice.push({
          level: "warning",
          icon: "🍽️",
          title: `「${suspectFoods.join("・")}」は悪化日に集中して登場します`,
          body: `悪化した日の ${Math.round((foodCount[suspectFoods[0]] / bad.length) * 100)}% にこれらが含まれており、良好な日よりも明らかに多い傾向があります。`,
          action: `1〜2週間、${suspectFoods.join("・")}を控えて変化を観察してみましょう。`
        });
      }
    }
  }

  // ── 良好パターン ──────────────────────────────────────
  if (good.length >= 2) {
    const goodFoodCount = {};
    good.forEach(d => {
      const foods = [...(d["朝"] || []), ...(d["昼"] || []), ...(d["夜"] || [])];
      foods.forEach(f => { goodFoodCount[f] = (goodFoodCount[f] || 0) + 1; });
    });
    const topGoodFoods = Object.entries(goodFoodCount)
      .filter(([, c]) => c / good.length >= 0.5)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 3)
      .map(([f]) => f);

    if (topGoodFoods.length > 0) {
      advice.push({
        level: "good",
        icon: "✨",
        title: `調子がいい日は「${topGoodFoods.join("・")}」をよく食べています`,
        body: `症状が落ち着いていた日の半数以上にこれらが含まれています。`,
        action: "これらを意識的に取り入れることで症状が安定するかもしれません。"
      });
    }
  }

  // ── 気温差 ────────────────────────────────────────────
  const tempScored = scored.filter(d => d.tempHigh != null && d.tempLow != null);
  if (tempScored.length >= 3) {
    const bigDiff  = tempScored.filter(d => (d.tempHigh - d.tempLow) >= 10);
    const smallDiff = tempScored.filter(d => (d.tempHigh - d.tempLow) < 7);
    const avg = arr => arr.length ? arr.reduce((s, d) => s + d.score, 0) / arr.length : null;
    const aBig = avg(bigDiff), aSmall = avg(smallDiff);
    if (aBig != null && aSmall != null && aBig - aSmall >= 0.8) {
      advice.push({
        level: "warning", icon: "🌡",
        title: "気温差が大きい日は症状が悪化しやすいです",
        body: `1日の気温差10℃以上の日の平均スコアは ${aBig.toFixed(1)}、7℃未満の日は ${aSmall.toFixed(1)} です。`,
        action: "寒暖差が大きい日は保湿・保温をいつもより念入りにしましょう。"
      });
    }
  }

  // ── 花粉 ──────────────────────────────────────────────
  const pollenScored = scored.filter(d => d.pollen);
  if (pollenScored.length >= 3) {
    const pollenHigh = pollenScored.filter(d => d.pollen.includes("多い") || d.pollen.includes("非常に"));
    const pollenLow  = pollenScored.filter(d => d.pollen.includes("少ない"));
    const avg = arr => arr.length ? arr.reduce((s, d) => s + d.score, 0) / arr.length : null;
    const aHigh = avg(pollenHigh), aLow = avg(pollenLow);
    if (aHigh != null && aLow != null && aHigh - aLow >= 0.8) {
      advice.push({
        level: "warning", icon: "🌸",
        title: "花粉が多い日は症状が悪化しやすいです",
        body: `花粉が多い日の平均スコアは ${aHigh.toFixed(1)}、少ない日は ${aLow.toFixed(1)} です。`,
        action: "花粉シーズンは外出後のシャワーや着替えを意識し、外干しを控えましょう。"
      });
    }
  }

  // ── 外干し ────────────────────────────────────────────
  const laundryScored = scored.filter(d => d.laundry);
  if (laundryScored.length >= 3) {
    const outside = laundryScored.filter(d => d.laundry === "外干し");
    const inside  = laundryScored.filter(d => d.laundry === "室内干し");
    const avg = arr => arr.length ? arr.reduce((s, d) => s + d.score, 0) / arr.length : null;
    const aOut = avg(outside), aIn = avg(inside);
    if (aOut != null && aIn != null && aOut - aIn >= 0.8) {
      advice.push({
        level: "info", icon: "👕",
        title: "外干しの日の翌日に症状が出やすい可能性があります",
        body: `外干しの日の平均スコアは ${aOut.toFixed(1)}、室内干しは ${aIn.toFixed(1)} です。花粉や PM2.5 の付着が影響しているかもしれません。`,
        action: "花粉シーズンや黄砂の多い時期は室内干しや乾燥機の使用も検討しましょう。"
      });
    }
  }

  // ── 運動 ──────────────────────────────────────────────
  const withEx    = scored.filter(d => d.exercise && d.exercise.length > 0);
  const withoutEx = scored.filter(d => !d.exercise || d.exercise.length === 0);
  const avgEx    = withEx.length    ? withEx.reduce((s, d) => s + d.score, 0) / withEx.length : null;
  const avgNoEx  = withoutEx.length ? withoutEx.reduce((s, d) => s + d.score, 0) / withoutEx.length : null;

  if (avgEx != null && avgNoEx != null && withEx.length >= 2) {
    if (avgEx - avgNoEx <= -0.8) {
      advice.push({
        level: "good", icon: "🏃",
        title: "運動した日は症状が落ち着いています",
        body: `運動した日の平均スコアは ${avgEx.toFixed(1)}、しなかった日は ${avgNoEx.toFixed(1)} です。`,
        action: "運動習慣を続けましょう。ヨガやウォーキングなど無理のない範囲で。"
      });
    } else if (avgEx - avgNoEx >= 0.8) {
      advice.push({
        level: "info", icon: "🏃",
        title: "運動後に症状が出やすいかもしれません",
        body: `運動した日の平均スコアは ${avgEx.toFixed(1)}、しなかった日は ${avgNoEx.toFixed(1)} です。`,
        action: "汗をかいたらすぐシャワーを。激しい運動よりヨガやウォーキングから試してみましょう。"
      });
    }
  }

  // 運動種類別
  const exTypes = ["🧘 ヨガ", "🚶 ウォーキング", "🏃 ランニング", "💪 筋トレ", "🤸 ストレッチ"];
  const exAvgs = exTypes.map(type => {
    const days = scored.filter(d => (d.exercise || []).includes(type));
    const a = days.length >= 2 ? days.reduce((s, d) => s + d.score, 0) / days.length : null;
    return { type, avg: a, count: days.length };
  }).filter(e => e.avg != null).sort((a, b) => a.avg - b.avg);

  if (exAvgs.length > 0) {
    const best = exAvgs[0];
    advice.push({
      level: "good", icon: "✨",
      title: `${best.type} の日は特に症状が落ち着いています`,
      body: `${best.type} をした日の平均スコアは ${best.avg.toFixed(1)} です（${best.count}回のデータより）。`,
      action: `${best.type} はあなたの肌に合っているようです。積極的に取り入れてみましょう。`
    });
  }

  const overallAvg = scored.reduce((s, d) => s + d.score, 0) / scored.length;
  const trend = (() => {
    if (scored.length < 4) return null;
    const half = Math.floor(scored.length / 2);
    // キーでソートして前半・後半に分ける
    const sortedKeys = Object.keys(logs).sort();
    const recent = sortedKeys.slice(-half).map(k => logs[k]).filter(d => d.score != null);
    const older  = sortedKeys.slice(0, half).map(k => logs[k]).filter(d => d.score != null);
    if (!recent.length || !older.length) return null;
    const avgRecent = recent.reduce((s, d) => s + d.score, 0) / recent.length;
    const avgOlder  = older.reduce((s, d) => s + d.score, 0) / older.length;
    return { avgRecent, avgOlder, diff: avgRecent - avgOlder };
  })();

  if (trend && Math.abs(trend.diff) >= 0.5) {
    advice.unshift({
      level: trend.diff < 0 ? "good" : "warning",
      icon: trend.diff < 0 ? "📈" : "📉",
      title: trend.diff < 0 ? "最近、症状が改善傾向です！" : "最近、症状が悪化傾向にあります",
      body: `直近の平均スコアは ${trend.avgRecent.toFixed(1)}（以前は ${trend.avgOlder.toFixed(1)}）です。`,
      action: trend.diff < 0 ? "今の生活習慣を続けていきましょう。" : "食事・睡眠・ストレスのいずれかが変化していないか振り返ってみましょう。"
    });
  }

  return advice;
}

// 音声入力ボタン
function VoiceButton({ onResult }) {
  const [listening, setListening] = useState(false);
  const [transcript, setTranscript] = useState("");
  const recogRef = useRef(null);

  const supported = typeof window !== "undefined" && ("SpeechRecognition" in window || "webkitSpeechRecognition" in window);

  const toggle = () => {
    if (!supported) { alert("このブラウザは音声入力に対応していません"); return; }
    if (listening) {
      recogRef.current?.stop();
      setListening(false);
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recog = new SR();
    recog.lang = "ja-JP";
    recog.interimResults = true;
    recog.onresult = e => {
      const t = Array.from(e.results).map(r => r[0].transcript).join("");
      setTranscript(t);
      if (e.results[e.results.length - 1].isFinal) {
        onResult(t);
        setTranscript("");
        setListening(false);
      }
    };
    recog.onerror = () => setListening(false);
    recog.onend = () => setListening(false);
    recogRef.current = recog;
    recog.start();
    setListening(true);
  };

  return (
    <div>
      <button onClick={toggle} style={{
        display: "flex", alignItems: "center", gap: 6,
        padding: "8px 16px", borderRadius: 20, border: "none", cursor: "pointer",
        background: listening ? "#ff5252" : "#4a7c59",
        color: "#fff", fontSize: 13, fontFamily: "inherit",
        animation: listening ? "pulse 1s infinite" : "none",
      }}>
        <span style={{ fontSize: 16 }}>{listening ? "⏹" : "🎤"}</span>
        {listening ? "録音中… タップで停止" : "音声で入力"}
      </button>
      {transcript && (
        <div style={{ marginTop: 6, fontSize: 12, color: "#88aa88", padding: "4px 10px", background: "#f0f8ee", borderRadius: 8 }}>
          {transcript}
        </div>
      )}
      <div style={{ marginTop: 6, fontSize: 11, color: "#aabba0", lineHeight: 1.8 }}>
        例：「睡眠7 ストレス2 天気晴 最高25 最低15 花粉多い スギ 掃除した 換気した 室内干し メモ腕がかゆい」
      </div>
      <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }`}</style>
    </div>
  );
}

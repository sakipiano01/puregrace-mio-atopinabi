// ── 日付ヘルパー ──────────────────────────────────────
function toKey(d) { return d.toISOString().slice(0, 10); }
function todayKey() { return toKey(new Date()); }
function prevDay(k) { const d = new Date(k + "T00:00:00"); d.setDate(d.getDate() - 1); return toKey(d); }
function nextDay(k) { const d = new Date(k + "T00:00:00"); d.setDate(d.getDate() + 1); return toKey(d); }
function dispDate(k) {
  return new Date(k + "T00:00:00").toLocaleDateString("ja-JP", { month: "short", day: "numeric", weekday: "short" });
}

// ── 全角→半角数字変換 ────────────────────────────────
function toHalf(s) { return s.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)); }

// ── 音声テキストのパース ──────────────────────────────
// 「睡眠7 ストレス2 天気晴 最高25 最低15 花粉多い メモ腕がかゆい」
function parseVoiceText(text) {
  const result = {};
  const num = (re) => { const m = text.match(re); return m ? parseFloat(toHalf(m[1])) : null; };
  const int = (re) => { const m = text.match(re); return m ? parseInt(toHalf(m[1])) : null; };

  const sleep = num(/睡眠\s*([0-9０-９.．]+)/);  if (sleep != null) result.sleep = sleep;
  const stress = int(/ストレス\s*([0-4０-４])/);  if (stress != null) result.stress = stress;
  const tHigh = int(/最高\s*([0-9０-９-－]+)/);   if (tHigh != null) result.tempHigh = tHigh;
  const tLow  = int(/最低\s*([0-9０-９-－]+)/);   if (tLow  != null) result.tempLow  = tLow;

  if (text.includes("晴"))                          result.weather = "☀️ 晴";
  else if (text.includes("雨"))                     result.weather = "🌧 雨";
  else if (text.includes("曇") || text.includes("くもり")) result.weather = "⛅ 曇";
  else if (text.includes("雪"))                     result.weather = "❄️ 雪";

  if (text.includes("非常に多い") || text.includes("めちゃ多")) result.pollen = "🔴 非常に多い";
  else if (text.includes("花粉多い") || text.includes("花粉多め")) result.pollen = "🟠 多い";
  else if (text.includes("花粉やや") || text.includes("花粉少し")) result.pollen = "🟡 やや多い";
  else if (text.includes("花粉少ない") || text.includes("花粉なし")) result.pollen = "🟢 少ない";

  if (text.includes("掃除した") || text.includes("掃除あり")) result.cleaning = true;
  if (text.includes("外干し")) result.laundry = "外干し";
  else if (text.includes("室内干し") || text.includes("部屋干し")) result.laundry = "室内干し";
  if (text.includes("換気した") || text.includes("換気あり")) result.ventilation = true;

  const memo = text.match(/メモ\s*(.+)/);
  if (memo) result.memo = memo[1].trim();

  return result;
}

function makeTestLogs() {

// ── 分析計算 ──────────────────────────────────────────
function calcFoodRanking(logs) {
  const stats = {};
  Object.values(logs).forEach(day => {
    if (day.score == null) return;
    const foods = [...(day["朝"] || []), ...(day["昼"] || []), ...(day["夜"] || [])];
    foods.forEach(f => {
      if (!stats[f]) stats[f] = { total: 0, count: 0 };
      stats[f].total += day.score;
      stats[f].count += 1;
    });
  });
  return Object.entries(stats)
    .filter(([, s]) => s.count >= 2)
    .map(([food, s]) => ({ food, avg: s.total / s.count, count: s.count }))
    .sort((a, b) => b.avg - a.avg);
}

function calcLifeRanking(logs) {
  // 睡眠・ストレス・天気・気温と症状スコアの相関をシンプルに集計
  const scored = Object.values(logs).filter(d => d.score != null);
  if (scored.length < 3) return null;

  // 睡眠: 7時間以上 vs 未満
  const sleepData = scored.filter(d => d.sleep != null);
  const sleepShort = sleepData.filter(d => d.sleep < 7);
  const sleepLong  = sleepData.filter(d => d.sleep >= 7);
  const sleepAvgShort = sleepShort.length ? sleepShort.reduce((s, d) => s + d.score, 0) / sleepShort.length : null;
  const sleepAvgLong  = sleepLong.length  ? sleepLong.reduce((s, d) => s + d.score, 0) / sleepLong.length  : null;

  // ストレス: 高(3-4) vs 低(0-1)
  const stressData = scored.filter(d => d.stress != null);
  const stressHigh = stressData.filter(d => d.stress >= 3);
  const stressLow  = stressData.filter(d => d.stress <= 1);
  const stressAvgHigh = stressHigh.length ? stressHigh.reduce((s, d) => s + d.score, 0) / stressHigh.length : null;
  const stressAvgLow  = stressLow.length  ? stressLow.reduce((s, d) => s + d.score, 0) / stressLow.length  : null;

  // 天気別平均
  const weatherMap = {};
  scored.filter(d => d.weather).forEach(d => {
    if (!weatherMap[d.weather]) weatherMap[d.weather] = { total: 0, count: 0 };
    weatherMap[d.weather].total += d.score;
    weatherMap[d.weather].count += 1;
  });
  const weatherAvg = Object.entries(weatherMap)
    .filter(([, v]) => v.count >= 2)
    .map(([w, v]) => ({ label: w, avg: v.total / v.count, count: v.count }))
    .sort((a, b) => b.avg - a.avg);

  return { sleepAvgShort, sleepAvgLong, stressAvgHigh, stressAvgLow, weatherAvg };
}

// ── 複合分析・アドバイス生成 ──────────────────────────
function generateAdvice(logs) {
  const scored = Object.values(logs).filter(d => d.score != null);
  if (scored.length < 3) return [];

  const advice = [];
  const bad = scored.filter(d => d.score >= 3);   // 悪化日
  const good = scored.filter(d => d.score <= 1);  // 良好日
  const badRate = bad.length / scored.length;

  // ── 睡眠 ────────────────────────────────────────────
  const sleepScored = scored.filter(d => d.sleep != null);
  if (sleepScored.length >= 3) {
    const short = sleepScored.filter(d => d.sleep < 6);
    const mid   = sleepScored.filter(d => d.sleep >= 6 && d.sleep < 7);
    const long  = sleepScored.filter(d => d.sleep >= 7);
    const avg = arr => arr.length ? arr.reduce((s, d) => s + d.score, 0) / arr.length : null;
    const aShort = avg(short), aMid = avg(mid), aLong = avg(long);

    if (aShort != null && aLong != null && aShort - aLong >= 0.8) {
      advice.push({
        level: "warning",
        icon: "💤",
        title: "睡眠不足が症状を悪化させています",
        body: `6時間未満の日の症状スコアは平均 ${aShort.toFixed(1)}、7時間以上では ${aLong.toFixed(1)} です。${(aShort - aLong).toFixed(1)}ポイントの差があります。`,
        action: "まず7時間の睡眠を目標にしてみましょう。"
      });
    } else if (aLong != null && aLong <= 1.0) {
      advice.push({
        level: "good",
        icon: "💤",
        title: "十分な睡眠が効果的です",
        body: `7時間以上寝た日の症状スコアは平均 ${aLong.toFixed(1)} と低めです。`,
        action: "この睡眠習慣を続けましょう。"
      });
    }

    // 睡眠不足の悪化日での割合
    if (bad.length >= 2) {
      const badWithSleep = bad.filter(d => d.sleep != null);
      const badSleepShort = badWithSleep.filter(d => d.sleep < 7);
      if (badWithSleep.length > 0 && badSleepShort.length / badWithSleep.length >= 0.6) {
        advice.push({
          level: "warning",
          icon: "⚠️",
          title: `悪化した日の ${Math.round(badSleepShort.length / badWithSleep.length * 100)}% が睡眠7時間未満でした`,
          body: "症状が悪化しやすい日には睡眠不足が関係していることが多いようです。",
          action: "睡眠を優先することが症状改善への近道かもしれません。"
        });
      }
    }
  }

  // ── ストレス ──────────────────────────────────────────
  const stressScored = scored.filter(d => d.stress != null);
  if (stressScored.length >= 3) {
    const high = stressScored.filter(d => d.stress >= 3);
    const low  = stressScored.filter(d => d.stress <= 1);
    const avg = arr => arr.length ? arr.reduce((s, d) => s + d.score, 0) / arr.length : null;
    const aHigh = avg(high), aLow = avg(low);

    if (aHigh != null && aLow != null && aHigh - aLow >= 0.8) {
      advice.push({
        level: "warning",
        icon: "😤",
        title: "ストレスが高い日は症状が悪化しやすいです",
        body: `ストレス高(3〜4)の日は平均 ${aHigh.toFixed(1)}、低(0〜1)の日は平均 ${aLow.toFixed(1)} です。`,
        action: "ストレス管理がアトピーケアに直結しています。入浴やストレッチなど自分なりのリセット習慣を作りましょう。"
      });
    }
  }

  // ── 天気 ──────────────────────────────────────────────
  const weatherScored = scored.filter(d => d.weather);
  if (weatherScored.length >= 3) {
    const byWeather = {};
    weatherScored.forEach(d => {
      if (!byWeather[d.weather]) byWeather[d.weather] = [];
      byWeather[d.weather].push(d.score);
    });
    const weatherAvgs = Object.entries(byWeather)
      .filter(([, arr]) => arr.length >= 2)
      .map(([w, arr]) => ({ w, avg: arr.reduce((s, v) => s + v, 0) / arr.length }))
      .sort((a, b) => b.avg - a.avg);

    if (weatherAvgs.length >= 2) {
      const worst = weatherAvgs[0], best = weatherAvgs[weatherAvgs.length - 1];
      if (worst.avg - best.avg >= 0.8) {
        advice.push({
          level: "info",
          icon: "🌤",
          title: `${worst.w} の日は症状が出やすい傾向があります`,
          body: `${worst.w} の日の平均スコアは ${worst.avg.toFixed(1)} で、${best.w} の日(${best.avg.toFixed(1)})より高めです。`,
          action: `${worst.w} の日は食事や睡眠を特に意識してみましょう。`
        });
      }
    }
  }

  // ── 複合要因：睡眠不足 × ストレス高 ────────────────────
  const combo1 = scored.filter(d => d.sleep != null && d.stress != null && d.sleep < 7 && d.stress >= 3);
  const comboGood = scored.filter(d => d.sleep != null && d.stress != null && d.sleep >= 7 && d.stress <= 1);
  if (combo1.length >= 2 && comboGood.length >= 2) {
    const avgBad  = combo1.reduce((s, d) => s + d.score, 0) / combo1.length;
    const avgGood = comboGood.reduce((s, d) => s + d.score, 0) / comboGood.length;
    if (avgBad - avgGood >= 1.0) {
      advice.push({
        level: "warning",
        icon: "🔥",
        title: "睡眠不足＋高ストレスが重なると特に悪化しています",
        body: `「睡眠7h未満かつストレス高」の日は平均スコア ${avgBad.toFixed(1)}、「睡眠7h以上かつストレス低」の日は ${avgGood.toFixed(1)} です。`,
        action: "この2つが重なる日は食事も慎重に。トリガー食材（卵・乳製品など）を避けるだけで変わるかもしれません。"
      });
    }
  }

  // ── 食材 × 生活習慣の複合 ────────────────────────────
  // 悪化日に最も多く登場する食材を特定
  if (bad.length >= 2) {
    const foodCount = {};
    bad.forEach(d => {
      const foods = [...(d["朝"] || []), ...(d["昼"] || []), ...(d["夜"] || [])];
      foods.forEach(f => { foodCount[f] = (foodCount[f] || 0) + 1; });
    });
    const topBadFoods = Object.entries(foodCount)
      .filter(([, c]) => c >= 2 && c / bad.length >= 0.5)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 3)
      .map(([f]) => f);

    if (topBadFoods.length > 0) {
      // 良好日での登場率と比較
      const goodFoodRate = {};
      if (good.length > 0) {
        good.forEach(d => {
          const foods = [...(d["朝"] || []), ...(d["昼"] || []), ...(d["夜"] || [])];
          foods.forEach(f => { goodFoodRate[f] = (goodFoodRate[f] || 0) + 1; });
        });
      }
      const suspectFoods = topBadFoods.filter(f => {
        const badR = (foodCount[f] || 0) / bad.length;
        const goodR = good.length > 0 ? ((goodFoodRate[f] || 0) / good.length) : 0;
        return badR - goodR >= 0.3;
      });

      if (suspectFoods.length > 0) {
        advice.push({
          level: "warning",
          icon: "🍽️",
          title: `「${suspectFoods.join("・")}」は悪化日に集中して登場します`,
          body: `悪化した日の ${Math.round((foodCount[suspectFoods[0]] / bad.length) * 100)}% にこれらが含まれており、良好な日よりも明らかに多い傾向があります。`,
          action: `1〜2週間、${suspectFoods.join("・")}を控えて変化を観察してみましょう。`
        });
      }
    }
  }

  // ── 良好パターン ──────────────────────────────────────
  if (good.length >= 2) {
    const goodFoodCount = {};
    good.forEach(d => {
      const foods = [...(d["朝"] || []), ...(d["昼"] || []), ...(d["夜"] || [])];
      foods.forEach(f => { goodFoodCount[f] = (goodFoodCount[f] || 0) + 1; });
    });
    const topGoodFoods = Object.entries(goodFoodCount)
      .filter(([, c]) => c / good.length >= 0.5)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 3)
      .map(([f]) => f);

    if (topGoodFoods.length > 0) {
      advice.push({
        level: "good",
        icon: "✨",
        title: `調子がいい日は「${topGoodFoods.join("・")}」をよく食べています`,
        body: `症状が落ち着いていた日の半数以上にこれらが含まれています。`,
        action: "これらを意識的に取り入れることで症状が安定するかもしれません。"
      });
    }
  }

  // ── 気温差 ────────────────────────────────────────────
  const tempScored = scored.filter(d => d.tempHigh != null && d.tempLow != null);
  if (tempScored.length >= 3) {
    const bigDiff  = tempScored.filter(d => (d.tempHigh - d.tempLow) >= 10);
    const smallDiff = tempScored.filter(d => (d.tempHigh - d.tempLow) < 7);
    const avg = arr => arr.length ? arr.reduce((s, d) => s + d.score, 0) / arr.length : null;
    const aBig = avg(bigDiff), aSmall = avg(smallDiff);
    if (aBig != null && aSmall != null && aBig - aSmall >= 0.8) {
      advice.push({
        level: "warning", icon: "🌡",
        title: "気温差が大きい日は症状が悪化しやすいです",
        body: `1日の気温差10℃以上の日の平均スコアは ${aBig.toFixed(1)}、7℃未満の日は ${aSmall.toFixed(1)} です。`,
        action: "寒暖差が大きい日は保湿・保温をいつもより念入りにしましょう。"
      });
    }
  }

  // ── 花粉 ──────────────────────────────────────────────
  const pollenScored = scored.filter(d => d.pollen);
  if (pollenScored.length >= 3) {
    const pollenHigh = pollenScored.filter(d => d.pollen.includes("多い") || d.pollen.includes("非常に"));
    const pollenLow  = pollenScored.filter(d => d.pollen.includes("少ない"));
    const avg = arr => arr.length ? arr.reduce((s, d) => s + d.score, 0) / arr.length : null;
    const aHigh = avg(pollenHigh), aLow = avg(pollenLow);
    if (aHigh != null && aLow != null && aHigh - aLow >= 0.8) {
      advice.push({
        level: "warning", icon: "🌸",
        title: "花粉が多い日は症状が悪化しやすいです",
        body: `花粉が多い日の平均スコアは ${aHigh.toFixed(1)}、少ない日は ${aLow.toFixed(1)} です。`,
        action: "花粉シーズンは外出後のシャワーや着替えを意識し、外干しを控えましょう。"
      });
    }
  }

  // ── 外干し ────────────────────────────────────────────
  const laundryScored = scored.filter(d => d.laundry);
  if (laundryScored.length >= 3) {
    const outside = laundryScored.filter(d => d.laundry === "外干し");
    const inside  = laundryScored.filter(d => d.laundry === "室内干し");
    const avg = arr => arr.length ? arr.reduce((s, d) => s + d.score, 0) / arr.length : null;
    const aOut = avg(outside), aIn = avg(inside);
    if (aOut != null && aIn != null && aOut - aIn >= 0.8) {
      advice.push({
        level: "info", icon: "👕",
        title: "外干しの日の翌日に症状が出やすい可能性があります",
        body: `外干しの日の平均スコアは ${aOut.toFixed(1)}、室内干しは ${aIn.toFixed(1)} です。花粉や PM2.5 の付着が影響しているかもしれません。`,
        action: "花粉シーズンや黄砂の多い時期は室内干しや乾燥機の使用も検討しましょう。"
      });
    }
  }


  const overallAvg = scored.reduce((s, d) => s + d.score, 0) / scored.length;
  const trend = (() => {
    if (scored.length < 4) return null;
    const half = Math.floor(scored.length / 2);
    // キーでソートして前半・後半に分ける
    const sortedKeys = Object.keys(logs).sort();
    const recent = sortedKeys.slice(-half).map(k => logs[k]).filter(d => d.score != null);
    const older  = sortedKeys.slice(0, half).map(k => logs[k]).filter(d => d.score != null);
    if (!recent.length || !older.length) return null;
    const avgRecent = recent.reduce((s, d) => s + d.score, 0) / recent.length;
    const avgOlder  = older.reduce((s, d) => s + d.score, 0) / older.length;
    return { avgRecent, avgOlder, diff: avgRecent - avgOlder };
  })();

  if (trend && Math.abs(trend.diff) >= 0.5) {
    advice.unshift({
      level: trend.diff < 0 ? "good" : "warning",
      icon: trend.diff < 0 ? "📈" : "📉",
      title: trend.diff < 0 ? "最近、症状が改善傾向です！" : "最近、症状が悪化傾向にあります",
      body: `直近の平均スコアは ${trend.avgRecent.toFixed(1)}（以前は ${trend.avgOlder.toFixed(1)}）です。`,
      action: trend.diff < 0 ? "今の生活習慣を続けていきましょう。" : "食事・睡眠・ストレスのいずれかが変化していないか振り返ってみましょう。"
    });
  }

  return advice;
}

// 音声入力ボタン
function VoiceButton({ onResult }) {
  const [listening, setListening] = useState(false);
  const [transcript, setTranscript] = useState("");
  const recogRef = useRef(null);

  const supported = typeof window !== "undefined" && ("SpeechRecognition" in window || "webkitSpeechRecognition" in window);

  const toggle = () => {
    if (!supported) { alert("このブラウザは音声入力に対応していません"); return; }
    if (listening) {
      recogRef.current?.stop();
      setListening(false);
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recog = new SR();
    recog.lang = "ja-JP";
    recog.interimResults = true;
    recog.onresult = e => {
      const t = Array.from(e.results).map(r => r[0].transcript).join("");
      setTranscript(t);
      if (e.results[e.results.length - 1].isFinal) {
        onResult(t);
        setTranscript("");
        setListening(false);
      }
    };
    recog.onerror = () => setListening(false);
    recog.onend = () => setListening(false);
    recogRef.current = recog;
    recog.start();
    setListening(true);
  };

  return (
    <div>
      <button onClick={toggle} style={{
        display: "flex", alignItems: "center", gap: 6,
        padding: "8px 16px", borderRadius: 20, border: "none", cursor: "pointer",
        background: listening ? "#ff5252" : "#4a7c59",
        color: "#fff", fontSize: 13, fontFamily: "inherit",
        animation: listening ? "pulse 1s infinite" : "none",
      }}>
        <span style={{ fontSize: 16 }}>{listening ? "⏹" : "🎤"}</span>
        {listening ? "録音中… タップで停止" : "音声で入力"}
      </button>
      {transcript && (
        <div style={{ marginTop: 6, fontSize: 12, color: "#88aa88", padding: "4px 10px", background: "#f0f8ee", borderRadius: 8 }}>
          {transcript}
        </div>
      )}
      <div style={{ marginTop: 6, fontSize: 11, color: "#aabba0", lineHeight: 1.8 }}>
        例：「睡眠7 ストレス2 天気晴 最高25 最低15 花粉多い スギ 掃除した 換気した 室内干し メモ腕がかゆい」
      </div>
      <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }`}</style>
    </div>
  );
}

// 数値スコアバー

    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ width: 80, height: 8, borderRadius: 4, background: "#f0f0ee", overflow: "hidden" }}>

  );
}

function App() {
  const [logs, setLogs] = useState({});
  const [date, setDate] = useState(todayKey());
  const [tab, setTab] = useState("record");
  const [loaded, setLoaded] = useState(false);
  const [splash, setSplash] = useState(true);

  useEffect(() => { loadLogs().then(l => { setLogs(l); setLoaded(true); }); }, []);

  if (splash) return <SplashScreen onStart={() => setSplash(false)} />;

  const day = logs[date] || {};

  const update = async (patch) => {
    const next = { ...logs, [date]: { ...day, ...patch } };
    setLogs(next);
    await saveLogs(next);
  };

  const toggleFood = (meal, food) => {
    const cur = day[meal] || [];
    update({ [meal]: cur.includes(food) ? cur.filter(f => f !== food) : [...cur, food] });
  };
  const addFood = (meal, food) => {
    const cur = day[meal] || [];
    if (!cur.includes(food)) update({ [meal]: [...cur, food] });
  };

  // 音声結果をパースして各フィールドに反映
  const handleVoice = (text) => {
    const parsed = parseVoiceText(text);
    if (Object.keys(parsed).length > 0) update(parsed);
  };




  const foodRanking = calcFoodRanking(logs);
  const lifeStats = calcLifeRanking(logs);
  const adviceList = generateAdvice(logs);
  const badFoods = foodRanking.slice(0, 5);
  const goodFoods = [...foodRanking].sort((a, b) => a.avg - b.avg).slice(0, 3);
  const recordedDays = Object.keys(logs).sort().reverse();
  const totalDays = recordedDays.length;

  // 連続記録日数
  const calcStreak = () => {
    let streak = 0;
    let d = new Date();
    if (!logs[toKey(d)] || logs[toKey(d)].score == null) d.setDate(d.getDate() - 1);
    while (true) {
      const k = toKey(d);
      if (!logs[k] || logs[k].score == null) break;
      streak++;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  };
  const streak = calcStreak();

  // 今週の記録率
  const calcWeekRate = () => {
    const today = new Date();
    let recorded = 0;
    for (let i = 6; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      if (logs[toKey(d)]?.score != null) recorded++;
    }
    return recorded;
  };
  const weekRecorded = calcWeekRate();

  // みおちゃん声かけ
  const getMioMessage = () => {
    const todayLogged = logs[todayKey()]?.score != null;
    const yd = new Date(); yd.setDate(yd.getDate() - 1);
    const yesterdayLogged = logs[toKey(yd)]?.score != null;
    if (streak >= 7) return { face: "happy",    text: streak + "日連続記録中！🔥 すごい、この調子だよ！" };
    if (streak >= 3) return { face: "happy",    text: streak + "日連続記録中！✨ いい感じ、続けてね！" };
    if (todayLogged)  return { face: "normal",   text: "今日も記録できてるね。ありがとう！" };
    if (!yesterdayLogged && totalDays > 0) return { face: "surprised", text: "昨日の記録がないよ！思い出せたら入れてね🌿" };
    if (!todayLogged && totalDays > 0)    return { face: "thinking",  text: "今日の記録まだだよ。症状スコアだけでもOK！" };
    return { face: "normal", text: "今日の食事・症状を記録してみよう🌿" };
  };
  const mioMsg = getMioMessage();

  if (!loaded) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", fontFamily: "sans-serif", color: "#7a9a6a" }}>読み込み中…</div>
  );

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(150deg, #eef6ea 0%, #e8f2f8 100%)", fontFamily: "'Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif" }}>



      {/* ヘッダー */}
      <div style={{ background: "rgba(255,255,255,0.9)", backdropFilter: "blur(10px)", borderBottom: "1px solid #daecd2", padding: "14px 16px 0", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ maxWidth: 580, margin: "0 auto" }}>
          {/* タイトル + バッジ */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
            <div>
              <span style={{ fontSize: 20, fontWeight: 900, color: "#2d5a38" }}>🧭 あとぴなび</span>
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              {streak > 0 && (
                <div style={{ fontSize: 12, background: "#fff8e8", border: "1.5px solid #f9c84a", borderRadius: 20, padding: "3px 10px", color: "#a07820", fontWeight: 700 }}>
                  🔥 {streak}日連続
                </div>
              )}
              <div style={{ fontSize: 12, background: "#f0f8f0", border: "1.5px solid #c8dfc0", borderRadius: 20, padding: "3px 10px", color: "#4a7c59", fontWeight: 700 }}>

            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: "#88aa88" }}>記録 {totalDays} 日分</div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={async () => { const m = { ...makeTestLogs(), ...logs }; setLogs(m); await saveLogs(m); }}
                  style={{ fontSize: 11, padding: "4px 10px", borderRadius: 6, border: "1.5px solid #8bc34a", background: "#f4fbe8", color: "#4a7020", cursor: "pointer", fontFamily: "inherit" }}>
                  🧪 テストデータ
                </button>
                <button onClick={async () => { setLogs({}); await saveLogs({}); }}
                  style={{ fontSize: 11, padding: "4px 10px", borderRadius: 6, border: "1.5px solid #ffcdd2", background: "#fff5f5", color: "#c62828", cursor: "pointer", fontFamily: "inherit" }}>
                  🗑 リセット
                </button>
              </div>
            </div>

            {totalDays < 3 ? (
              <div style={{ background: "#fff", borderRadius: 14, padding: 28, textAlign: "center", color: "#9aaa90", fontSize: 13, lineHeight: 1.8, boxShadow: "0 1px 8px #d0e8c820" }}>
                🌱 症状スコアつきの記録を<br />3日以上貯めると分析できます
              </div>
            ) : (
              <>
                {adviceList.length > 0 && (
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#2d5a38", marginBottom: 10 }}>🧠 あなたへのアドバイス</div>
                    {adviceList.map((a, i) => {
                      const s = { warning: { bg: "#fff8f0", border: "#ffcc99", title: "#b05000" }, good: { bg: "#f0faf0", border: "#99d9a0", title: "#2e7d32" }, info: { bg: "#f0f4ff", border: "#99b8e8", title: "#3050a0" } }[a.level] || { bg: "#f0f4ff", border: "#99b8e8", title: "#3050a0" };
                      return (
                        <div key={i} style={{ background: s.bg, border: "1.5px solid " + s.border, borderRadius: 12, padding: "12px 14px", marginBottom: 10 }}>
                          <div style={{ fontSize: 13, fontWeight: 700, color: s.title, marginBottom: 5 }}>{a.icon} {a.title}</div>
                          <div style={{ fontSize: 12, color: "#445544", lineHeight: 1.7, marginBottom: 6 }}>{a.body}</div>
                          <div style={{ fontSize: 12, color: "#667766", background: "rgba(255,255,255,0.6)", borderRadius: 8, padding: "6px 10px", lineHeight: 1.6 }}>💡 {a.action}</div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {badFoods.length > 0 && (
                  <div style={{ background: "#fff", borderRadius: 14, padding: 18, marginBottom: 14, boxShadow: "0 1px 8px #d0e8c820" }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#b03020", marginBottom: 14 }}>⚠️ 悪化しやすい食材 TOP{badFoods.length}</div>
                    {badFoods.map((item, i) => {
                      const rc = ["#c62828","#e53935","#ef6c00","#f9a825","#aed581"];
                      return (
                        <div key={item.food} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                          <div style={{ width: 24, height: 24, borderRadius: "50%", background: rc[i], color: "#fff", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{i+1}</div>
                          <div style={{ flex: 1, fontSize: 14, color: "#223322" }}>{item.food}</div>
                          <ScoreBar value={item.avg} color={SCORE_COLORS[Math.round(item.avg)]} />
                          <div style={{ fontSize: 11, color: "#bbb", minWidth: 24 }}>{item.count}回</div>
                        </div>
                      );
                    })}
                    <div style={{ fontSize: 11, color: "#bbb", marginTop: 4 }}>スコア：0(良好) 〜 4(重症) の平均値</div>
                  </div>
                )}

                {goodFoods.length > 0 && (
                  <div style={{ background: "#fff", borderRadius: 14, padding: 18, marginBottom: 14, boxShadow: "0 1px 8px #d0e8c820" }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#2e7d32", marginBottom: 14 }}>✨ 症状が落ち着いてるときの食材 TOP{goodFoods.length}</div>
                    {goodFoods.map((item, i) => {
                      const gc = ["#2e7d32","#388e3c","#43a047"];
                      return (
                        <div key={item.food} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                          <div style={{ width: 24, height: 24, borderRadius: "50%", background: gc[i], color: "#fff", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{i+1}</div>
                          <div style={{ flex: 1, fontSize: 14, color: "#223322" }}>{item.food}</div>
                          <ScoreBar value={item.avg} color="#66bb6a" />
                          <div style={{ fontSize: 11, color: "#bbb", minWidth: 24 }}>{item.count}回</div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {lifeStats && (
                  <div style={{ background: "#fff", borderRadius: 14, padding: 18, boxShadow: "0 1px 8px #d0e8c820" }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#5060a0", marginBottom: 14 }}>🌙 生活習慣との相関</div>
                    {lifeStats.sleepAvgShort != null && lifeStats.sleepAvgLong != null && (
                      <div style={{ marginBottom: 16 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#7a9a7a", marginBottom: 8 }}>💤 睡眠時間</div>
                        <div style={{ display: "flex", gap: 10 }}>
                          <div style={{ flex: 1, background: "#fef8f0", borderRadius: 10, padding: "10px 12px" }}>
                            <div style={{ fontSize: 11, color: "#aa8860", marginBottom: 4 }}>7時間未満</div>
                            <ScoreBar value={lifeStats.sleepAvgShort} color={SCORE_COLORS[Math.round(lifeStats.sleepAvgShort)]} />
                          </div>
                          <div style={{ flex: 1, background: "#f0f8f0", borderRadius: 10, padding: "10px 12px" }}>
                            <div style={{ fontSize: 11, color: "#5a8a5a", marginBottom: 4 }}>7時間以上</div>
                            <ScoreBar value={lifeStats.sleepAvgLong} color={SCORE_COLORS[Math.round(lifeStats.sleepAvgLong)]} />
                          </div>
                        </div>
                      </div>
                    )}
                    {lifeStats.stressAvgHigh != null && lifeStats.stressAvgLow != null && (
                      <div style={{ marginBottom: 16 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#7a9a7a", marginBottom: 8 }}>😤 ストレス</div>
                        <div style={{ display: "flex", gap: 10 }}>
                          <div style={{ flex: 1, background: "#fef0f0", borderRadius: 10, padding: "10px 12px" }}>
                            <div style={{ fontSize: 11, color: "#aa6060", marginBottom: 4 }}>高ストレス(3〜4)</div>
                            <ScoreBar value={lifeStats.stressAvgHigh} color={SCORE_COLORS[Math.round(lifeStats.stressAvgHigh)]} />
                          </div>
                          <div style={{ flex: 1, background: "#f0f8f0", borderRadius: 10, padding: "10px 12px" }}>
                            <div style={{ fontSize: 11, color: "#5a8a5a", marginBottom: 4 }}>低ストレス(0〜1)</div>
                            <ScoreBar value={lifeStats.stressAvgLow} color={SCORE_COLORS[Math.round(lifeStats.stressAvgLow)]} />
                          </div>
                        </div>
                      </div>
                    )}
                    {lifeStats.weatherAvg.length > 0 && (
                      <div>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#7a9a7a", marginBottom: 8 }}>🌤 天気別</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                          {lifeStats.weatherAvg.map(w => (
                            <div key={w.label} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                              <div style={{ width: 60, fontSize: 12, color: "#556655" }}>{w.label}</div>
                              <ScoreBar value={w.avg} color={SCORE_COLORS[Math.round(w.avg)]} />
                              <div style={{ fontSize: 11, color: "#bbb" }}>{w.count}日</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </>
            )}
          </div>
        )}

        {/* 履歴タブ */}
        {tab === "history" && (
          <div>
            <MioSpeech face="normal" text={recordedDays.length === 0 ? "まだ記録がないよ。今日から始めよう！" : recordedDays.length + "日分の記録があるよ。タップすると編集できるよ。"} />
            {recordedDays.length === 0 ? (
              <div style={{ background: "#fff", borderRadius: 14, padding: 28, textAlign: "center", color: "#9aaa90", fontSize: 13, lineHeight: 1.8, boxShadow: "0 1px 8px #d0e8c820" }}>
                まだ記録がありません🌱<br />「今日」タブから記録してみよう
              </div>
            ) : recordedDays.map(k => {
              const d = logs[k];
              const allFoods = [...(d["朝"] || []), ...(d["昼"] || []), ...(d["夜"] || [])];
              const preview = allFoods.slice(0, 4).join("・") + (allFoods.length > 4 ? " …他" + (allFoods.length - 4) + "品" : "");
              return (
                <div key={k} onClick={() => { setDate(k); setTab("record"); }}
                  style={{ background: "#fff", borderRadius: 12, padding: "12px 14px", marginBottom: 10, cursor: "pointer", boxShadow: "0 1px 8px #d0e8c820", display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#2d5a38", marginBottom: 3 }}>{dispDate(k)}</div>
                    <div style={{ fontSize: 12, color: "#6a8870", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {allFoods.length > 0 ? preview : "食事未記録"}
                    </div>
                    <div style={{ display: "flex", gap: 8, marginTop: 3, flexWrap: "wrap" }}>
                      {d.sleep != null && <span style={{ fontSize: 11, color: "#aaa" }}>💤{d.sleep}h</span>}
                      {d.weather && <span style={{ fontSize: 11, color: "#aaa" }}>{d.weather}</span>}
                      {d.tempHigh != null && <span style={{ fontSize: 11, color: "#aaa" }}>🌡{d.tempHigh}/{d.tempLow}℃</span>}
                      {d.pollen && <span style={{ fontSize: 11, color: "#aaa" }}>{d.pollen}</span>}
                    </div>
                  </div>
                  {d.score != null && (
                    <div style={{ padding: "4px 10px", borderRadius: 8, background: SCORE_COLORS[d.score] + "22", color: SCORE_COLORS[d.score], fontWeight: 700, fontSize: 18, flexShrink: 0 }}>
                      {SCORE_LABELS[d.score].split(" ")[0]}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
